name: Daily AI CAPEX Data Update

on:
  schedule:
    - cron: '30 23 * * 1-5'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/**'
      - 'funding-panel.js'
      - 'index.html'
      - 'style.css'
      - 'config/**'
      - '.github/workflows/daily_update.yml'

permissions:
  contents: write

concurrency:
  group: ai-capex-data-update
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas numpy

      - name: Validate code and rules
        run: |
          python -m py_compile scripts/collect_market_data.py scripts/score_regime.py scripts/funding_confirmation.py scripts/apply_funding_confirmation.py
          python scripts/funding_confirmation.py --self-test
          python scripts/apply_funding_confirmation.py --self-test
          node --check app.js
          node --check funding-panel.js

      - name: Sync funding confirmation
        run: python scripts/funding_confirmation.py --sync

      - name: Collect Market Data
        run: python scripts/collect_market_data.py

      - name: Score Regime
        run: python scripts/score_regime.py

      - name: Apply funding confirmation overlay
        run: python scripts/apply_funding_confirmation.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add data/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated daily market data and regime update" && git push)
